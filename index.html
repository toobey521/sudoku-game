<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数独—Toobey</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif}
body{
  background:linear-gradient(135deg,#f0f4ff 0%,#e8f0fe 50%,#fce4ec 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:12px;margin:0;
}

/* ===== Shared Card ===== */
.card{
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:28px;
  box-shadow:0 8px 40px rgba(100,120,200,.15),0 2px 12px rgba(100,120,200,.08);
  padding:28px 20px 32px;
  width:100%;max-width:480px;
  position:relative;
  transition:opacity .35s ease,transform .35s ease;
}

/* ===== Page Visibility ===== */
.page{display:none;opacity:0;transform:translateY(12px)}
.page.active{display:block;animation:fadeIn .35s ease forwards}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}

/* ===== Home Page ===== */
#homePage{
  padding:12px 20px 134px;
  position:relative;left:-1cm;
}
#homePage .home-header{margin-bottom:2px}
#homePage .home-header h1{font-size:24px}
#homePage .anti-addiction{margin-bottom:6px;padding:4px 14px}
#homePage .badge-row{margin-bottom:4px}
#homePage .level-grid{gap:6px;margin-bottom:6px}
#homePage .level-btn{padding:8px 6px;border-radius:12px}
#homePage .home-footer{margin-top:0}
.home-header{text-align:center;margin-bottom:10px}
.home-header h1{font-size:32px;font-weight:800;letter-spacing:2px;color:#374151}
.home-header h1 .title-icon{display:inline;font-style:normal}
.home-header .sub{font-size:13px;color:#9aa0b6;margin-top:2px}
.anti-addiction{
  background:linear-gradient(135deg,#fff3e0,#ffe0b2);
  border-radius:14px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;font-size:13px;color:#e65100;
  border:1px solid rgba(255,152,0,.25);
}
.anti-addiction .icon{font-size:20px;flex-shrink:0}
.anti-addiction .text{line-height:1.5}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(102,126,234,.12);color:#667eea;font-weight:500}
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.level-btn{
  background:linear-gradient(135deg,#eef2ff,#e0e7ff);
  border:none;border-radius:16px;padding:18px 8px;
  cursor:pointer;transition:all .25s;
  font-size:14px;font-weight:600;color:#4a5680;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.level-btn .num{font-size:22px;font-weight:800}
.level-btn .diff{font-size:11px;font-weight:400;color:#8a94b6}
.level-btn .grid-info{font-size:10px;color:#a5b4d0;background:rgba(255,255,255,.4);padding:1px 8px;border-radius:8px;margin-top:2px}
.level-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(100,120,200,.2)}
.level-btn:active{transform:scale(.96)}
.level-btn.easy .num{background:linear-gradient(135deg,#43a047,#66bb6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.level-btn.medium .num{background:linear-gradient(135deg,#fb8c00,#ffa726);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.level-btn.hard .num{background:linear-gradient(135deg,#e53935,#ef5350);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.level-btn.expert .num{background:linear-gradient(135deg,#7b1fa2,#ab47bc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.level-btn.master .num{background:linear-gradient(135deg,#1a237e,#3949ab);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.level-btn.ultimate .num{background:linear-gradient(135deg,#4a0000,#8b0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-footer{text-align:center;font-size:11px;color:#c5cae9;margin-top:4px}

/* ===== Game Page ===== */
.game-top{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
}
.game-top .back-btn{
  background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;padding:4px 8px;line-height:1;
}
.game-top .title-area{text-align:center}
.game-top .title-area h2{font-size:20px;font-weight:700;color:#374151}
.game-top .title-area h2 .title-icon{display:inline;font-style:normal}
.game-top .title-area .level-label{font-size:11px;color:#9aa0b6}
.game-top .right-group{display:flex;align-items:center;gap:10px}
.game-top .timer{font-size:15px;font-weight:600;color:#6b7280;font-variant-numeric:tabular-nums}

.music-btn{
  background:none;border:none;font-size:18px;cursor:pointer;padding:4px 6px;border-radius:8px;
  transition:background .2s;line-height:1;
}
.music-btn:hover{background:rgba(0,0,0,.06)}

/* Sudoku Board */
.board-wrap{
  position:relative;margin:0 auto 16px;
  aspect-ratio:1;width:100%;max-width:400px;
}
.board{
  width:100%;height:100%;
  display:grid;gap:0;
  border-radius:10px;overflow:hidden;
  border:2.5px solid #374151;
}
.cell{
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:clamp(16px,4.5vw,24px);font-weight:500;color:#1f2937;
  cursor:pointer;transition:background .15s;position:relative;
  -webkit-tap-highlight-color:transparent;user-select:none;
  border-right:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;
}
/* Thick box borders via pseudo-elements to avoid corner miter overlap */
.cell.box-right::after{
  content:'';position:absolute;right:0;top:0;
  width:2.5px;height:100%;background:#374151;pointer-events:none;
}
.cell.box-bottom::before{
  content:'';position:absolute;bottom:0;left:0;
  height:2.5px;width:100%;background:#374151;pointer-events:none;
}
.cell:active{background:#e8f0fe}
.cell.fixed{font-weight:700;color:#111827;background:#f9fafb}
/* Player-entered numbers in blue to distinguish from fixed givens */
.cell{color:#1f2937}
.cell:not(.fixed){color:#2563eb}
.cell.editing{background:#dbeafe !important;font-weight:600}
.cell.editing.fixed{background:#dbeafe !important}
.cell.error{color:#e53935 !important;animation:shake .35s ease}
.cell.hint-same{background:#e8eaf6}
.cell.hint-related{background:#f3e5f5}
.cell.completed-anim{animation:pop .4s ease}
@keyframes shake{25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}

/* Number Pad */
.numpad{display:grid;gap:6px;margin-bottom:14px}
.num-btn{
  aspect-ratio:1;border:none;border-radius:12px;
  background:linear-gradient(135deg,#eef2ff,#e0e7ff);
  font-size:clamp(16px,4vw,22px);font-weight:600;color:#4a5680;
  cursor:pointer;transition:all .15s;
}
.num-btn:active{transform:scale(.88);background:#c7d2fe}
.num-btn.erase{background:linear-gradient(135deg,#fce4ec,#f8bbd0);color:#c62828;font-size:13px}

/* Action Bar */
.action-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.action-btn{
  padding:10px 18px;border:none;border-radius:14px;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#eef2ff,#e0e7ff);color:#4a5680;
}
.action-btn:active{transform:scale(.94)}
.action-btn.primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.action-btn.hint{background:linear-gradient(135deg,#f9a825,#ffd54f);color:#5d4037}
.action-btn.success{background:linear-gradient(135deg,#43a047,#66bb6a);color:#fff}
.action-btn.danger{background:linear-gradient(135deg,#e53935,#ef5350);color:#fff}

/* ===== Win Modal ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.45);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.show{display:flex}
.modal-box{
  background:#fff;border-radius:28px;padding:36px 28px 28px;
  text-align:center;max-width:360px;width:100%;
  animation:fadeIn .35s ease;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-box .emoji{font-size:56px;margin-bottom:8px}
.modal-box h2{font-size:24px;font-weight:700;color:#374151;margin-bottom:4px}
.modal-box p{font-size:14px;color:#6b7280;margin-bottom:20px;line-height:1.5}
.modal-box .modal-btn{
  padding:12px 32px;border:none;border-radius:16px;
  font-size:15px;font-weight:600;cursor:pointer;margin:4px;
  transition:all .2s;
}
.modal-box .modal-btn:active{transform:scale(.95)}
.modal-box .modal-btn.primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.modal-box .modal-btn.outline{background:#f3f4f6;color:#6b7280}
.modal-box .btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ===== Responsive ===== */
@media(max-width:480px){
  body{padding:6px}
  .card{padding:12px 10px 16px;border-radius:18px;max-width:100%}
  #homePage{left:0;padding:10px 10px 40px}
  #homePage .home-header h1{font-size:22px}
  #homePage .level-btn{padding:6px 4px;border-radius:10px}
  #homePage .level-grid{gap:5px}
  .home-header h1{font-size:26px}
  .level-btn{padding:10px 6px;border-radius:12px}
  .level-btn .num{font-size:18px}
  .level-btn .grid-info{font-size:9px}
  .anti-addiction{padding:6px 10px;font-size:12px;margin-bottom:8px;border-radius:10px}
  .badge-row{gap:4px}
  .badge{font-size:10px;padding:2px 7px}
  .home-footer{font-size:10px}
  /* Game page */
  .board-wrap{max-width:100% !important}
  .game-top{margin-bottom:10px}
  .game-top .title-area h2{font-size:16px}
  .game-top .back-btn{font-size:18px;padding:2px 6px}
  .game-top .right-group{gap:6px}
  .timer{font-size:13px}
  .music-btn{font-size:16px}
  /* Numpad */
  .numpad{gap:4px}
  .num-btn{border-radius:10px;font-size:clamp(14px,4.5vw,18px)}
  .num-btn.erase{font-size:12px}
  .numpad{grid-template-columns:repeat(5,1fr) !important}
  /* Action bar - 5 buttons wrap in 2 rows */
  .action-bar{gap:4px}
  .action-btn{padding:7px 6px;font-size:11px;min-width:0;white-space:nowrap}
}
@media(max-width:360px){
  .card{padding:8px 6px 12px;border-radius:14px}
  #homePage{padding:8px 6px 30px}
  .level-btn{padding:6px 3px}
  .level-btn .num{font-size:15px}
  .action-btn{padding:5px 4px;font-size:10px}
  .numpad{gap:3px}
  .num-btn{border-radius:8px}
  .board-wrap{margin-bottom:8px}
}
</style>

</head>
<body>
<!-- ===== HOME PAGE ===== -->
<div class="card" id="homePage">
  <div class="home-header">
    <h1><span class="title-icon">🧩</span> 数独</h1>
    <div class="sub">— 清新逻辑 · 每日一刻 —</div>
  </div>

  <div class="anti-addiction">
    <span class="icon">🕐</span>
    <span class="text"><b>健康游戏防沉迷提示：</b>合理控制游戏时间，建议每次不超过30分钟，注意用眼休息，享受健康生活。</span>
  </div>

  <div class="badge-row">
    <span class="badge">4×4 · 简单入门</span>
    <span class="badge">6×6 · 进阶挑战</span>
    <span class="badge">9×9 · 标准数独</span>
  </div>

  <div class="level-grid" id="levelGrid">
    <button class="level-btn easy" data-level="0"><span class="num">★</span> 简单 <span class="diff">Easy</span><span class="grid-info">4×4 入门</span></button>
    <button class="level-btn medium" data-level="1"><span class="num">★★</span> 中等 <span class="diff">Medium</span><span class="grid-info">6×6 进阶</span></button>
    <button class="level-btn hard" data-level="2"><span class="num">★★★</span> 困难 <span class="diff">Hard</span><span class="grid-info">9×9 标准</span></button>
    <button class="level-btn expert" data-level="3"><span class="num">★★★★</span> 专家 <span class="diff">Expert</span><span class="grid-info">9×9 进阶</span></button>
    <button class="level-btn master" data-level="4"><span class="num">★★★★★</span> 大师 <span class="diff">Master</span><span class="grid-info">9×9 终极</span></button>
    <button class="level-btn ultimate" data-level="5"><span class="num">💀</span> 骨灰 <span class="diff">Ultimate</span><span class="grid-info">9×9 炼狱</span></button>
  </div>

  <div class="home-footer">Sudoku — Toobey</div>
</div>


<script>
const MusicEngine = {
  ctx: null, gain: null, playing: false, nodes: [],
  init(){
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.gain = this.ctx.createGain();
      this.gain.gain.value = 0.12;
      this.gain.connect(this.ctx.destination);
    }catch(e){return false}
    return true;
  },
  playNote(freq, startTime, duration, gainVal){
    if(!this.ctx)return;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(gainVal*0.3, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime+duration);
    osc.connect(g);
    g.connect(this.gain);
    osc.start(startTime);
    osc.stop(startTime+duration);
    this.nodes.push(osc);
  },
  // Pentatonic ambient chord progression
  start(){
    if(!this.ctx)return;
    this.playing = true;
    const now = this.ctx.currentTime;
    // C major pentatonic: C D E G A
    const chords = [
      [261.63, 329.63, 392.00],  // CEG
      [293.66, 392.00, 440.00],  // DGA
      [220.00, 261.63, 329.63],  // ACE
      [261.63, 329.63, 440.00],  // CEA
    ];
    const beat = 2.5;
    const totalDuration = chords.length * beat * 2 + 4;
    for(let round=0; round<3; round++){
      chords.forEach((chord, ci)=>{
        const t = now + (round*chords.length + ci)*beat;
        chord.forEach((freq, fi)=>{
          this.playNote(freq, t + fi*0.3, beat*1.6, 0.7);
        });
      });
    }
    // Gentle high melody
    const melody = [523.25, 440.00, 587.33, 659.25, 523.25, 587.33, 440.00, 392.00];
    melody.forEach((freq, i)=>{
      this.playNote(freq, now + i*beat*0.75, beat*0.7, 0.35);
    });
    // Schedule next loop: reset playing then re-start to avoid re-entry guard
    this._timer = setTimeout(()=>{
      if(this.playing){
        this.playing = false;
        this.start();
      }
    }, (totalDuration+0.5)*1000);
  },
  stop(){
    this.playing = false;
    if(this._timer) clearTimeout(this._timer);
    this.nodes.forEach(n=>{try{n.stop()}catch(e){}});
    this.nodes = [];
  },
  toggle(){
    if(this.playing){this.stop();return false}
    if(!this.ctx)this.init();
    if(this.ctx && this.ctx.state==='suspended') this.ctx.resume();
    this.start();
    return true;
  }
};
document.querySelectorAll('.level-btn').forEach(b=>b.addEventListener('click',()=>window.location.href='game.html?level='+b.dataset.level));
setTimeout(()=>{MusicEngine.init();if(MusicEngine.ctx){if(MusicEngine.ctx.state==='suspended')MusicEngine.ctx.resume();MusicEngine.start();document.addEventListener('click',function _r(){if(MusicEngine.ctx&&MusicEngine.ctx.state==='suspended'){MusicEngine.ctx.resume();if(!MusicEngine.playing)MusicEngine.start()}document.removeEventListener('click',_r);},{once:true});}},500);
</script>
</body>
</html>
